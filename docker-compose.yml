services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: honeypot
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: honeypot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - honeypot-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/honeypot
      SPRING_DATASOURCE_USERNAME: honeypot
      SPRING_DATASOURCE_PASSWORD: honeypot
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - honeypot-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - honeypot-net

volumes:
  pgdata:

networks:
  honeypot-net:
    driver: bridge
