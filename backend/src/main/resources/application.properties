server.port=8080
spring.datasource.url=jdbc:h2:mem:honeypot
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
server.error.include-message=never

# Flyway desactivado en dev (H2 usa ddl-auto=create)
spring.flyway.enabled=false

# Rate limiting — dev relajado
honeypot.rate-limit.max=20
honeypot.rate-limit.window-seconds=60

# Actuator — todo expuesto en dev
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
